{% extends 'base.html' %}

{% block content %}

<h2>Residents</h2>

<form method="GET" class="mb-3">
    <input type="text" name="search" class="form-control" placeholder="Search residents...">
</form>

<form method="POST" action="/add_resident" class="row g-2 mb-3">
    <div class="col">
        <input type="text" name="name" class="form-control" placeholder="Name" required>
    </div>
    <div class="col">
        <input type="text" name="phone" class="form-control" placeholder="Phone">
    </div>
    <div class="col">
        <input type="email" name="email" class="form-control" placeholder="Email">
    </div>
    <div>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    <div class="col">
        <select name="room_id" class="form-control">
            {% for room in rooms %}
            <option value="{{ room[0] }}">{{ room[1] }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col">
        <button class="btn btn-primary">Add</button>
    </div>
</form>

<table class="table table-striped">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Action</th>
</tr>

{% for r in residents %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
    <td>{{ r[2] }}</td>
    <td>{{ r[3] }}</td>
    <td>
        <a href="/delete_resident/{{ r[0] }}" class="btn btn-danger btn-sm">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
