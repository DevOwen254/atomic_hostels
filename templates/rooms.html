{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Room Management</h2>

<!-- Add Room Form -->
<form method="POST" action="/add_room" class="row g-2 mb-4">
    <div class="col-md-4">
        <input type="text" name="room_number" class="form-control" placeholder="Room Number" required>
    </div>
    <div class="col-md-4">
        <input type="number" name="capacity" class="form-control" placeholder="Capacity" required>
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100">Add Room</button>
    </div>
</form>

<!-- Rooms Table -->
<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Room Number</th>
            <th>Capacity</th>
            <th>Occupied</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for room in rooms %}
        <tr>
            <td>{{ room[0] }}</td>
            <td>{{ room[1] }}</td>
            <td>{{ room[2] }}</td>
            <td>{{ room[3] }}</td>
            <td>
                {% if room[3] < room[2] %}
                    <span class="badge bg-success">Available</span>
                {% else %}
                    <span class="badge bg-danger">Full</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
