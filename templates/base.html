<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atomic Hostel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    overflow-x: hidden;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: #1e293b;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    color: #cbd5e1;
    display: block;
    padding: 12px 20px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

.sidebar .active {
    background: #0d6efd;
}

/* MAIN CONTENT */
.main {
    margin-left: 250px;
    padding: 20px;
}

/* TOPBAR */
.topbar {
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* CARDS */
.card {
    border: none;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }

    .main {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center">🏠 Atomic</h4>

    <a href="/resident_dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/complaints"><i class="bi bi-chat-dots"></i> Complaints</a>
    <a href="/reports"><i class="bi bi-flag"></i> Reports</a>
    <a href="/change_password"><i class="bi bi-lock"></i> Password</a>
    <a href="/logout" class="text-warning"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5>{{ title }}</h5>
        <span class="text-muted">Welcome</span>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
