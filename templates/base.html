<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atomic Hostel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    overflow-x: hidden;
}

.sidebar a.active {
    background: #0d6efd;
    color: white;
    border-radius: 5px;
}
/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: #1e293b;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    color: #cbd5e1;
    display: block;
    padding: 12px 20px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

.sidebar .active {
    background: #0d6efd;
}

/* MAIN CONTENT */
.main {
    margin-left: 250px;
    padding: 20px;
}

/* TOPBAR */
.topbar {
    background: white;
    padding: 10px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* CARDS */
.card {
    border: none;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* MOBILE */
@media (max-width: 768px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }

    .main {
        margin-left: 0;
    }
}
</style>
<script>
function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.style.display = sidebar.style.display === 'none' ? 'block' : 'none';
}
</script>
</head>

<body>
<button class="btn btn-primary d-md-none m-2" onclick="toggleSidebar()">
    ☰ Menu
</button>
<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="text-center">🏠 Atomic</h4>

    <!-- RESIDENT MENU -->
    {% if session.get('resident') %}
        <a href="/residents_dashboard"
           class="{% if title == 'Dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/complaints"
           class="{% if title == 'Complaints' %}active{% endif %}">
            <i class="bi bi-chat-dots"></i> Complaints
        </a>

        <a href="/reset_password"
           class="{% if title == 'Change Password' %}active{% endif %}">
            <i class="bi bi-lock"></i> Password
        </a>
    {% endif %}

    <!-- ADMIN MENU -->
    {% if session.get('admin') %}
        <a href="/dashboard"
           class="{% if title == 'Admin Dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/residents"
           class="{% if title == 'Manage Residents' %}active{% endif %}">
            <i class="bi bi-people"></i> Residents
        </a>

        <a href="/rooms"
           class="{% if title == 'Rooms' %}active{% endif %}">
            <i class="bi bi-door-open"></i> Rooms
        </a>

        <a href="/payments"
           class="{% if title == 'Payments' %}active{% endif %}">
            <i class="bi bi-cash"></i> Payments
        </a>

        <a href="/reports"
           class="{% if title == 'Reports & Analytics' %}active{% endif %}">
            <i class="bi bi-bar-chart"></i> Reports
        </a>
    {% endif %}

    <!-- LOGOUT -->
    <a href="/logout" class="text-warning">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>

</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5>{{ title }}</h5>
        <span class="text-muted">Welcome</span>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
