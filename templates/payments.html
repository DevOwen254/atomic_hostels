{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Payments Management</h2>

<!-- Add Payment Form -->
<form method="POST" action="/add_payment" class="row g-2 mb-4">
    
    <div class="col-md-4">
        <select name="resident_id" class="form-select">
            {% for r in residents %}
            <option value="{{ r[0] }}">{{ r[1] }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-4">
        <input type="number" name="amount" class="form-control" placeholder="Amount Paid" required>
    </div>

    <div class="col-md-2">
        <button class="btn btn-success w-100">Record Payment</button>
    </div>

</form>

<!-- Payments Table -->
<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Resident</th>
            <th>Amount Paid</th>
            <th>Balance</th>
            <th>Date</th>
        </tr>
    </thead>

    <tbody>
        {% for p in payments %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>KES {{ p[2] }}</td>
            <td>
                {% if p[3] <= 0 %}
                    <span class="text-success">Cleared</span>
                {% else %}
                    <span class="text-danger">KES {{ p[3] }}</span>
                {% endif %}
            </td>
            <td>{{ p[4] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
