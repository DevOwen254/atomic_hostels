<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Code</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
}

/* CARD */
.verify-card {
    width: 100%;
    max-width: 420px;
    padding: 30px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* SMALL DEVICES */
@media (max-width: 576px) {
    .verify-card {
        padding: 20px;
    }

    h3 {
        font-size: 1.4rem;
    }
}
</style>
</head>

<body>

<div class="container-fluid">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">

            <div class="verify-card">

                <h3 class="text-center mb-2">🔐 Verify Code</h3>
                <p class="text-center text-muted mb-3">Enter the code sent to your email</p>

                <!-- MESSAGE (SIMULATED EMAIL) -->
                {% if message %}
                <div class="alert alert-success text-center">
                    {{ message }}
                </div>
                {% endif %}

                <form method="POST" action="/verify_code">

                    <!-- CODE -->
                    <div class="mb-3">
                        <label class="form-label">Verification Code</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-shield-lock"></i>
                            </span>
                            <input type="text" name="code" class="form-control" placeholder="Enter code" required>
                        </div>
                    </div>

                    <!-- NEW PASSWORD -->
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" id="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                            <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </span>
                        </div>
                    </div>

                    <button class="btn btn-success w-100">
                        <i class="bi bi-check-circle"></i> Reset Password
                    </button>

                </form>

                <div class="mt-3 text-center">
                    <a href="/resident_login">← Back to Login</a>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if (pass.type === "password") {
        pass.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        pass.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}
</script>

</body>
</html>
