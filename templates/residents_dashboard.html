{% extends "base.html" %}
{% block content %}

<div class="row">

    <!-- Room -->
    <div class="col-12 col-md-4 mb-3">
        <div class="card p-4 text-center">
            <i class="bi bi-house-door fs-1 text-primary"></i>
            <h6 class="mt-2">Room</h6>
            <h3>{{ info[1] }}</h3>
        </div>
    </div>

    <!-- Payments -->
    <div class="col-12 col-md-4 mb-3">
        <div class="card p-4 text-center">
            <i class="bi bi-cash-stack fs-1 text-success"></i>
            <h6>Total Payments</h6>
            <h3>{{ payments|length }}</h3>
        </div>
    </div>

    <!-- Status -->
    <div class="col-12 col-md-4 mb-3">
        <div class="card p-4 text-center">
            <i class="bi bi-check-circle fs-1 text-info"></i>
            <h6>Status</h6>
            <h3>Active</h3>
        </div>
    </div>

</div>

<!-- Payment Table -->
<div class="card mt-4">
    <div class="card-header bg-primary text-white">
        Payment History
    </div>

    <div class="card-body table-responsive">

        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Amount</th>
                    <th>Balance</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                {% for p in payments %}
                <tr>
                    <td>Ksh {{ p[0] }}</td>
                    <td>Ksh {{ p[1] }}</td>
                    <td>{{ p[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>
</div>

{% endblock %}
